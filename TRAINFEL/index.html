<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu Fruits CSV</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
    padding-top: 40px;
  }

  img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid #ccc;
    margin-bottom: 15px;
  }

  input {
    padding: 10px;
    font-size: 16px;
    width: 220px;
  }

  button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
  }

  #result {
    font-size: 20px;
    margin-top: 15px;
  }
</style>

</head>
<body>

<h1>🍎 Jeu des Fruits</h1>

<img id="fruitImage" src="">

<br>

<input type="text" id="answer" placeholder="Nom, code ou couleur">

<br>

<button onclick="verifier()">Valider</button>
<button onclick="nouveauFruit()">Suivant</button>

<p id="result"></p>

<script>

let fruits = [];
let fruitActuel = null;

// 📥 Charger le CSV
fetch("fruits.csv")
  .then(response => response.text())
  .then(data => {
    const lignes = data.trim().split("\n").slice(1);

    fruits = lignes.map(ligne => {
      const [nom, code, couleur, image] = ligne.split(",");

      return {
        nom: nom.trim(),
        code: code.trim(),
        couleur: couleur.trim(),
        image: image.trim()
      };
    });

    nouveauFruit();
  });

// 🎲 choisir un fruit aléatoire
function nouveauFruit() {
  if (fruits.length === 0) return;

  fruitActuel = fruits[Math.floor(Math.random() * fruits.length)];

  document.getElementById("fruitImage").src = fruitActuel.image;
  document.getElementById("answer").value = "";
  document.getElementById("result").textContent = "";
}

// ✅ vérifier réponse
function verifier() {
  const reponse = document.getElementById("answer").value.toLowerCase().trim();

  if (
    reponse === fruitActuel.nom.toLowerCase() ||
    reponse === fruitActuel.code.toLowerCase() ||
    reponse === fruitActuel.couleur.toLowerCase()
  ) {
    document.getElementById("result").textContent = "✅ Correct !";
  } else {
    document.getElementById("result").textContent =
      "❌ Faux ! Réponse : " + fruitActuel.nom;
  }
}

</script>

</body>
</html>
