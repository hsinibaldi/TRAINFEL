<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu Fruits CSV</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #fdfbfb, #ebedee);
    padding-top: 40px;
  }

  h1 {
    margin-bottom: 20px;
  }

  #game {
    background: white;
    width: 320px;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }

  img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid #ddd;
    margin-bottom: 15px;
  }

  input {
    padding: 10px;
    font-size: 16px;
    width: 90%;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
  }

  button {
    padding: 10px 15px;
    margin: 8px 5px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  #checkBtn {
    background: #4CAF50;
    color: white;
  }

  #nextBtn {
    background: #2196F3;
    color: white;
  }

  #result {
    font-size: 18px;
    margin-top: 15px;
    min-height: 25px;
  }

  .ok {
    color: green;
    font-weight: bold;
  }

  .ko {
    color: red;
    font-weight: bold;
  }
</style>

</head>
<body>

<h1>🍎 Jeu des Fruits</h1>

<div id="game">

  <img id="fruitImage" src="" alt="fruit">

  <input type="text" id="answer" placeholder="Nom du fruit">

  <br>

  <button id="checkBtn" onclick="verifier()">Valider</button>
  <button id="nextBtn" onclick="nouveauFruit()">Suivant</button>

  <p id="result"></p>

</div>

<script>

let fruits = [];
let fruitActuel = null;

// 📥 Charger le CSV GitHub (séparateur ;)
fetch("BDD.csv")
  .then(res => res.text())
  .then(data => {

    const lignes = data.trim().split("\n").slice(1);

    fruits = lignes.map(ligne => {

      const [libelle, reponse1, nomImage, image] = ligne.split(";");

      return {
        libelle: libelle?.trim(),
        reponse: reponse1?.trim(),
        nomImage: nomImage?.trim(),
        image: image?.trim()
      };
    });

    nouveauFruit();
  });

// 🎲 choisir un fruit aléatoire
function nouveauFruit() {
  if (fruits.length === 0) return;

  fruitActuel = fruits[Math.floor(Math.random() * fruits.length)];

  document.getElementById("fruitImage").src = fruitActuel.image;
  document.getElementById("answer").value = "";
  document.getElementById("result").textContent = "";
  document.getElementById("result").className = "";

  console.log("Image chargée :", fruitActuel.image);
}

// ✅ vérifier réponse
function verifier() {

  const reponse = document.getElementById("answer").value
    .toLowerCase()
    .trim();

  const bonneReponse = fruitActuel.reponse.toLowerCase();

  if (reponse === bonneReponse) {
    document.getElementById("result").textContent = "✅ Correct !";
    document.getElementById("result").className = "ok";
  } else {
    document.getElementById("result").textContent =
      "❌ Faux ! Réponse : " + fruitActuel.reponse;

    document.getElementById("result").className = "ko";
  }
}

</script>

</body>
</html>
